# Site configuration — see https://github.com/adityatelange/hugo-PaperMod/wiki
#
# baseURL is the single swap-point for the custom domain (brodsbytes.blog,
# attached 2026-07-09). The GitHub Actions workflow overrides this at build
# time via actions/configure-pages, which reads the live Pages config — so
# it now resolves to https://brodsbytes.blog/ too. This value only matters
# for local production builds.
baseURL: "https://brodsbytes.blog/"

title: "brodsbytes blog"
theme: PaperMod
locale: en-au
timeZone: Australia/Brisbane

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# JSON output on home is required for PaperMod's Fuse.js search
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Required by the GitHub Pages workflow (image cache lives in CI cacheDir)
caches:
  images:
    dir: :cacheDir/images

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 10

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: archives
      name: Archive
      url: /archives/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30

params:
  env: production
  description: "Homelab, Linux, and self-hosted infrastructure tinkering." 
  keywords: [blog, homelab, linux, self-hosted]
  defaultTheme: auto # follows the visitor's OS/browser light-dark preference
  disableThemeToggle: false

  # Header mark: "Byte Row" — 8 bits (01100010, ASCII "b"), only the lit
  # bits animate. Pure CSS opacity keyframes on inline SVG: no images, no
  # JS, respects prefers-reduced-motion. Exempted from the "no CSS
  # customisation" rule since it's self-contained and theme-driven, not a
  # site-wide style change.
  label:
    text: "brodsbytes"
    iconSVG: |
      <svg xmlns="http://www.w3.org/2000/svg" width="53" height="16" viewBox="0 0 40 12" fill="none" aria-hidden="true">
      <style>
      @keyframes bbBitFlash{0%,8%{opacity:1}28%{opacity:.42}100%{opacity:.42}}
      .bb-bit{animation:bbBitFlash 2.4s ease-out infinite}
      @media (prefers-reduced-motion: reduce){.bb-bit{animation:none;opacity:1}}
      </style>
      <rect x="1.61" y="2" width="3.6" height="8" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect class="bb-bit" style="animation-delay:0.3s" x="6.35" y="2" width="3.6" height="8" rx="1.4" fill="currentColor"/>
      <rect class="bb-bit" style="animation-delay:0.6s" x="11.09" y="2" width="3.6" height="8" rx="1.4" fill="currentColor"/>
      <rect x="15.83" y="2" width="3.6" height="8" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect x="20.57" y="2" width="3.6" height="8" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect x="25.31" y="2" width="3.6" height="8" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <rect class="bb-bit" style="animation-delay:1.8s" x="30.05" y="2" width="3.6" height="8" rx="1.4" fill="currentColor"/>
      <rect x="34.79" y="2" width="3.6" height="8" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.2"/>
      </svg>

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRSS: true
  ShowToc: true
  TocOpen: false

  homeInfoParams:
    Title: "Hi there"
    Content: >
      Notes from my tech tinkering: Linux, automation & homelabing.

  socialIcons:
    - name: github
      url: "https://github.com/brodsbytes"
    - name: linkedin
      url: "https://www.linkedin.com/in/brodie-rummery-b41b21146/"

  fuseOpts: # search tuning for the /search/ page
    isCaseSensitive: false
    shouldSort: true
    minMatchCharLength: 2
    keys: [title, permalink, summary, content]

  # Analytics: beacon enabled via layouts/partials/extend_head.html.
  analytics:
    cloudflare:
      token: "fda3c82743d54436a0fde87005dec126" # from Cloudflare dashboard > Web Analytics
    goatcounter:
      code: "" # fallback option: goatcounter site code, e.g. "brodsblog"
